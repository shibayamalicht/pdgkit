name: Publish to npm

# 既定は端末から手動で `npm publish` します（このワークフローは任意）。
# GitHub 上で公開したいときだけ、Secrets に NPM_TOKEN を登録してから
# Actions タブの "Run workflow" で手動実行してください（Release では自動発火しません）。

on:
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      # npm publish は prepublishOnly(typecheck + test + build)を自動実行します。
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
