name: Publish to npm

# ブラウザだけで公開できます:
#   - GitHub で Release を作成する（推奨。タグも付く）か、
#   - Actions タブの "Run workflow" ボタンから手動実行する。
# どちらも npm publish はこの GitHub のランナー上で走ります（あなたの端末は不要）。

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      # npm publish は prepublishOnly(typecheck + test + build)を自動実行します。
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
